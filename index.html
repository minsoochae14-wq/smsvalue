<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>문자혜택</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.10.0/dist/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f0ec}
.app{width:100%;max-width:430px;margin:0 auto;min-height:100vh;background:#f0f0ec;display:flex;flex-direction:column}
.topbar{background:#fff;border-bottom:0.5px solid rgba(0,0,0,.07);padding:52px 16px 10px}
.topbar-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.logo{font-size:18px;font-weight:700;color:#111}
.logo span{color:#1D9E75}
.search-wrap{position:relative}
.search-wrap input{width:100%;padding:10px 14px 10px 36px;font-size:14px;border:0.5px solid rgba(0,0,0,.1);border-radius:24px;background:#f5f5f0;color:#111;outline:none}
.search-wrap input::placeholder{color:#bbb}
.search-wrap i{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:16px;color:#bbb}
.filter-row{display:flex;gap:6px;padding:10px 16px;overflow-x:auto;background:#fff;border-bottom:0.5px solid rgba(0,0,0,.06)}
.filter-row::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;font-size:12px;font-weight:500;padding:6px 14px;border-radius:20px;border:0.5px solid rgba(0,0,0,.1);background:#fff;color:#777;cursor:pointer}
.chip.on{background:#E1F5EE;color:#085041;border-color:#5DCAA5}
.scroll-area{flex:1;overflow-y:auto;padding-bottom:90px}
.list-wrap{padding:14px 16px;display:flex;flex-direction:column;gap:10px}
.bcard{background:#fff;border:0.5px solid rgba(0,0,0,.08);border-radius:16px;padding:16px;cursor:pointer}
.bcard-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.bbadge{font-size:11px;font-weight:600;padding:4px 9px;border-radius:20px;background:#E1F5EE;color:#085041}
.tbadge{font-size:11px;font-weight:600;padding:4px 9px;border-radius:20px}
.th{background:#EAF3DE;color:#3B6D11}
.tm{background:#FAEEDA;color:#633806}
.tl{background:#FCEBEB;color:#A32D2D}
.bcard-title{font-size:15px;font-weight:500;color:#111;margin-bottom:10px;line-height:1.4}
.bcard-foot{display:flex;align-items:center;gap:12px}
.meta{font-size:12px;color:#aaa;display:flex;align-items:center;gap:4px}
.dday{font-size:12px;font-weight:700;color:#E24B4A;margin-left:auto}
.empty-state{text-align:center;padding:60px 20px;color:#bbb}
.empty-state i{font-size:40px;margin-bottom:12px;display:block}
.empty-state p{font-size:14px;line-height:1.6}
.fab{position:fixed;bottom:80px;right:16px;width:54px;height:54px;border-radius:50%;background:#1D9E75;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:50;box-shadow:0 4px 16px rgba(29,158,117,.35)}
@media(min-width:430px){.fab{right:calc(50% - 199px)}}
.fab i{font-size:24px;color:#fff;pointer-events:none}
.bottom-nav{background:#fff;border-top:0.5px solid rgba(0,0,0,.08);display:flex;padding:8px 0 24px;position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;z-index:40}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 0;cursor:pointer}
.nav-item i{font-size:22px;color:#ccc;pointer-events:none}
.nav-item span{font-size:10px;color:#ccc;pointer-events:none}
.nav-item.on i,.nav-item.on span{color:#1D9E75}
.nav-item.on span{font-weight:600}
.detail-screen{position:fixed;top:0;left:50%;transform:translateX(-50%) translateX(100%);width:100%;max-width:430px;height:100vh;background:#fff;transition:transform .28s cubic-bezier(.4,0,.2,1);z-index:60;display:flex;flex-direction:column}
.detail-screen.open{transform:translateX(-50%) translateX(0)}
.detail-nav{padding:52px 16px 12px;display:flex;align-items:center;gap:12px;border-bottom:0.5px solid rgba(0,0,0,.08)}
.back-btn{width:34px;height:34px;border-radius:50%;background:#f5f5f0;border:0.5px solid rgba(0,0,0,.1);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.back-btn i{pointer-events:none}
.detail-scroll{flex:1;overflow-y:auto;padding:18px 16px 0}
.brand-row{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.brand-ico{width:44px;height:44px;border-radius:12px;background:#E1F5EE;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#085041;flex-shrink:0}
.brand-name{font-size:16px;font-weight:700;color:#111}
.brand-cat{font-size:13px;color:#999;margin-top:2px}
.sms-box{background:#f5f5f0;border-radius:14px;padding:16px;margin-bottom:16px}
.sms-lbl{font-size:11px;font-weight:700;color:#aaa;margin-bottom:8px;letter-spacing:.04em}
.sms-text{font-size:14px;color:#111;line-height:1.7}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.info-cell{background:#f5f5f0;border-radius:12px;padding:12px}
.info-lbl{font-size:11px;color:#aaa;margin-bottom:4px;font-weight:500}
.info-val{font-size:15px;font-weight:700;color:#111}
.trust-wrap{margin-bottom:16px}
.trust-row{display:flex;justify-content:space-between;margin-bottom:7px}
.trust-bar-bg{height:7px;background:#f0f0ec;border-radius:4px;overflow:hidden}
.trust-fill{height:100%;border-radius:4px}
.dup-row{display:flex;align-items:center;gap:8px;padding:12px 14px;background:#f5f5f0;border-radius:12px;margin-bottom:20px}
.dup-cnt{font-size:14px;font-weight:700;color:#1D9E75}
.dup-txt{font-size:14px;color:#666}
.detail-actions{padding:14px 16px 34px;border-top:0.5px solid rgba(0,0,0,.08);display:flex;gap:8px;background:#fff}
.btn-sec{flex:1;padding:14px;font-size:15px;border-radius:14px;border:0.5px solid rgba(0,0,0,.12);background:#fff;color:#111;cursor:pointer;font-weight:500;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-sec i{pointer-events:none}
.btn-pri{flex:1;padding:14px;font-size:15px;font-weight:700;border-radius:14px;background:#1D9E75;color:#fff;border:none;cursor:pointer}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:70;display:none}
.overlay.open{display:block}
.sheet-body{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#fff;border-radius:24px 24px 0 0;padding:22px 16px 40px;z-index:80;display:none;max-height:90vh;overflow-y:auto}
.sheet-body.open{display:block}
.sheet-handle{width:38px;height:4px;border-radius:2px;background:#ddd;margin:0 auto 20px}
.sheet-title{font-size:18px;font-weight:700;color:#111;margin-bottom:5px}
.sheet-sub{font-size:14px;color:#aaa;margin-bottom:20px}
.paste-area{width:100%;min-height:120px;border:1.5px dashed #d0d0cc;border-radius:16px;background:#fafaf8;padding:16px;margin-bottom:16px;cursor:text}
.paste-area:focus-within{border-color:#1D9E75;background:#fff}
.paste-area textarea{width:100%;background:transparent;border:none;outline:none;font-size:15px;color:#111;line-height:1.65;resize:none;min-height:90px;font-family:inherit}
.paste-area textarea::placeholder{color:#ccc}
.analyzing{display:none;align-items:center;gap:12px;padding:14px 16px;background:#f5f5f0;border-radius:14px;margin-bottom:16px}
.analyzing.show{display:flex}
.dot-spin{width:20px;height:20px;border:2px solid #9FE1CB;border-top-color:#1D9E75;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.result-card{display:none;border:0.5px solid rgba(0,0,0,.08);border-radius:16px;overflow:hidden;margin-bottom:12px}
.result-card.show{display:block}
.result-header{background:#E1F5EE;padding:12px 16px;display:flex;align-items:center;gap:8px}
.result-header i{font-size:17px;color:#085041;pointer-events:none}
.result-header span{font-size:14px;font-weight:700;color:#085041}
.result-body{padding:14px 16px;display:flex;flex-direction:column;gap:10px}
.result-row{display:flex;align-items:center;justify-content:space-between}
.result-lbl{font-size:13px;color:#aaa;display:flex;align-items:center;gap:6px}
.result-lbl i{font-size:14px;pointer-events:none}
.result-val{font-size:14px;font-weight:600;color:#111}
.result-divider{height:0.5px;background:#f0f0ec}
.trust-mini{display:flex;align-items:center;gap:10px}
.tbar{flex:1;height:6px;background:#f0f0ec;border-radius:3px;overflow:hidden}
.tfill{height:100%;border-radius:3px}
.submit-ok{width:100%;padding:16px;font-size:16px;font-weight:700;border-radius:16px;background:#1D9E75;color:#fff;border:none;cursor:pointer;margin-top:6px}
.submit-ok:disabled{opacity:.35;cursor:not-allowed}
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#111;color:#fff;font-size:14px;padding:12px 20px;border-radius:12px;z-index:200;display:none;white-space:nowrap}
.toast.show{display:block}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="topbar-row">
      <div class="logo">문자<span>혜택</span></div>
      <div style="width:34px;height:34px;border-radius:50%;background:#f5f5f0;border:0.5px solid rgba(0,0,0,.08);display:flex;align-items:center;justify-content:center">
        <i class="ti ti-bell" style="font-size:18px;color:#bbb"></i>
      </div>
    </div>
    <div class="search-wrap">
      <i class="ti ti-search"></i>
      <input type="text" id="searchInput" placeholder="브랜드 또는 혜택 검색...">
    </div>
  </div>
  <div class="filter-row" id="filterRow">
    <span class="chip on" data-cat="전체">전체</span>
    <span class="chip" data-cat="음료/카페">음료/카페</span>
    <span class="chip" data-cat="편의점">편의점</span>
    <span class="chip" data-cat="배달">배달</span>
    <span class="chip" data-cat="패션">패션</span>
    <span class="chip" data-cat="뷰티">뷰티</span>
  </div>
  <div class="scroll-area">
    <div class="list-wrap" id="listWrap">
      <div class="empty-state"><i class="ti ti-loader"></i><p>불러오는 중...</p></div>
    </div>
  </div>
  <button class="fab" id="fabBtn"><i class="ti ti-plus"></i></button>
  <div class="bottom-nav">
    <div class="nav-item on"><i class="ti ti-home"></i><span>홈</span></div>
    <div class="nav-item"><i class="ti ti-search"></i><span>탐색</span></div>
    <div class="nav-item" id="navSubmit"><i class="ti ti-circle-plus"></i><span>올리기</span></div>
    <div class="nav-item"><i class="ti ti-star"></i><span>저장</span></div>
    <div class="nav-item"><i class="ti ti-user"></i><span>마이</span></div>
  </div>
</div>

<div class="detail-screen" id="detailScreen">
  <div class="detail-nav">
    <div class="back-btn" id="backBtn"><i class="ti ti-arrow-left" style="font-size:18px;color:#111"></i></div>
    <span style="font-size:16px;font-weight:700;color:#111" id="detailNavTitle">혜택 상세</span>
  </div>
  <div class="detail-scroll" id="detailBody"></div>
  <div class="detail-actions">
    <button class="btn-sec" id="alsoBtn"><i class="ti ti-plus"></i> 나도 받았어요</button>
    <button class="btn-pri" id="shareBtn">공유하기</button>
  </div>
</div>

<div class="overlay" id="overlay"></div>
<div class="sheet-body" id="sheetBody">
  <div class="sheet-handle"></div>
  <div class="sheet-title">문자 올리기</div>
  <div class="sheet-sub">받은 문자를 붙여넣으면 AI가 자동으로 분류해요</div>
  <div class="paste-area" id="pasteArea">
    <textarea id="smsTA" placeholder="여기를 탭하고 문자를 붙여넣어 주세요..."></textarea>
  </div>
  <div class="analyzing" id="analyzing">
    <div class="dot-spin"></div>
    <span style="font-size:14px;color:#666">AI가 문자를 분석하는 중...</span>
  </div>
  <div class="result-card" id="resultCard">
    <div class="result-header"><i class="ti ti-sparkles"></i><span>AI 자동 분류 완료</span></div>
    <div class="result-body" id="resultBody"></div>
  </div>
  <button class="submit-ok" id="submitOk" disabled>붙여넣기 후 자동 분류됩니다</button>
</div>

<div class="toast" id="toast"></div>

<script>
var SUPABASE_URL = 'https://zillfttfqjfvztecmdpx.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InppbGxmdHRmcWpmdnp0ZWNtZHB4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2MTg1NjgsImV4cCI6MjA5NTE5NDU2OH0.LhJF004Xl_h2m5t6jo8qmsLw6fFBSazPv4_I9IIZ2HA';

var db = null;
var allItems = [];
var currentFilter = '전체';
var aiResult = null;
var aiTimer = null;

var MOCK = [
  {id:1,brand:'스타벅스',category:'음료/카페',summary:'아메리카노 1+1',raw_sms:'[스타벅스] 강남점 아메리카노 1+1 이벤트. ~6/30 앱 쿠폰 제시.',end_date:'2025-06-30',location:'강남점',trust_score:87,status:'approved',submit_count:12,created_at:new Date().toISOString()},
  {id:2,brand:'GS25',category:'편의점',summary:'삼각김밥 1+1',raw_sms:'[GS25] 삼각김밥 전품목 1+1! ~6/15 전국 GS25.',end_date:'2025-06-15',location:'전국',trust_score:91,status:'approved',submit_count:8,created_at:new Date().toISOString()},
  {id:3,brand:'배달의민족',category:'배달',summary:'치킨 3,000원 할인',raw_sms:'[배달의민족] 치킨 주문 시 3,000원 즉시할인. ~6/20.',end_date:'2025-06-20',location:'전국',trust_score:62,status:'approved',submit_count:3,created_at:new Date().toISOString()},
];

var AI_POOL = [
  {brand:'스타벅스',category:'음료/카페',summary:'아메리카노 1+1',end_date:'2025-06-30',location:'강남점',trust_score:87},
  {brand:'GS25',category:'편의점',summary:'삼각김밥 1+1',end_date:'2025-06-15',location:'전국',trust_score:91},
  {brand:'배달의민족',category:'배달',summary:'치킨 3,000원 할인',end_date:'2025-06-20',location:'전국',trust_score:62},
  {brand:'올리브영',category:'뷰티',summary:'앱 전용 20% 할인',end_date:'2025-06-10',location:'앱 전용',trust_score:74},
  {brand:'CU',category:'편의점',summary:'음료 2+1',end_date:'2025-06-25',location:'전국 CU',trust_score:83},
];

function init() {
  try {
    if(window.supabase) {
      db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      console.log('Supabase 초기화 성공');
    } else {
      console.error('Supabase 라이브러리 로드 실패');
    }
  } catch(e) {
    console.error('Supabase 초기화 오류:', e);
    db = null;
  }

  document.getElementById('fabBtn').addEventListener('click', openSheet);
  document.getElementById('navSubmit').addEventListener('click', openSheet);
  document.getElementById('overlay').addEventListener('click', closeSheet);
  document.getElementById('backBtn').addEventListener('click', closeDetail);
  document.getElementById('alsoBtn').addEventListener('click', openSheet);
  document.getElementById('shareBtn').addEventListener('click', shareItem);
  document.getElementById('pasteArea').addEventListener('click', function(){ document.getElementById('smsTA').focus(); });
  document.getElementById('smsTA').addEventListener('input', onInput);
  document.getElementById('submitOk').addEventListener('click', doSubmit);
  document.getElementById('searchInput').addEventListener('input', function(){ renderList(); });

  document.getElementById('filterRow').addEventListener('click', function(e){
    var chip = e.target.closest('.chip');
    if(!chip) return;
    document.querySelectorAll('.chip').forEach(function(c){ c.classList.remove('on'); });
    chip.classList.add('on');
    currentFilter = chip.dataset.cat;
    renderList();
  });

  loadData();
}

function loadData() {
  if(db) {
    fetchData();
    setInterval(fetchData, 5000);
  } else {
    console.error('Supabase 초기화 실패');
    document.getElementById('listWrap').innerHTML = '<div class="empty-state"><i class="ti ti-alert-circle"></i><p>DB 연결 실패<br>페이지를 새로고침해주세요</p></div>';
  }
}

function fetchData() {
  db.from('sms_benefits')
    .select('*')
    .eq('status','approved')
    .order('created_at',{ascending:false})
    .then(function(res){
      if(res.error) {
        console.error('fetchData 오류:', res.error);
        document.getElementById('listWrap').innerHTML = '<div class="empty-state"><i class="ti ti-alert-circle"></i><p>데이터 로드 실패<br>' + res.error.message + '</p></div>';
        return;
      }
      if(res.data) {
        allItems = res.data;
        renderList();
      }
    })
    .catch(function(e){
      console.error('네트워크 오류:', e);
      document.getElementById('listWrap').innerHTML = '<div class="empty-state"><i class="ti ti-wifi-off"></i><p>네트워크 오류<br>인터넷 연결을 확인해주세요</p></div>';
    });
}

function renderList() {
  var q = document.getElementById('searchInput').value.toLowerCase();
  var items = allItems.filter(function(d){
    if(currentFilter !== '전체' && d.category !== currentFilter) return false;
    if(q && !(d.brand||'').toLowerCase().includes(q) && !(d.summary||'').toLowerCase().includes(q)) return false;
    return true;
  });
  var wrap = document.getElementById('listWrap');
  if(!items.length) {
    wrap.innerHTML = '<div class="empty-state"><i class="ti ti-inbox"></i><p>아직 등록된 혜택이 없어요<br>첫 번째로 문자를 올려보세요!</p></div>';
    return;
  }
  wrap.innerHTML = items.map(function(d){
    var tc = d.trust_score>=75?'th':d.trust_score>=50?'tm':'tl';
    var tl = d.trust_score>=75?'신뢰 높음':d.trust_score>=50?'신뢰 보통':'검토 중';
    var dd = calcDday(d.end_date);
    return '<div class="bcard" data-id="'+d.id+'"><div class="bcard-top"><span class="bbadge">'+d.brand+'</span><span class="tbadge '+tc+'">'+tl+'</span></div><div class="bcard-title">'+d.summary+(d.location&&d.location!=='전국'?' — '+d.location:'')+'</div><div class="bcard-foot"><span class="meta"><i class="ti ti-calendar"></i>~'+fmtDate(d.end_date)+'</span><span class="meta"><i class="ti ti-users"></i>'+(d.submit_count||1)+'명</span>'+(dd!==null?'<span class="dday">D-'+dd+'</span>':'')+'</div></div>';
  }).join('');
  document.querySelectorAll('.bcard').forEach(function(c){
    c.addEventListener('click', function(){ openDetail(this.dataset.id); });
  });
}

function openDetail(id) {
  var d = allItems.find(function(i){ return i.id == id; });
  if(!d) return;
  document.getElementById('detailNavTitle').textContent = d.brand;
  var tc = d.trust_score>=75?'#639922':d.trust_score>=50?'#BA7517':'#E24B4A';
  var tt = d.trust_score>=75?'#3B6D11':d.trust_score>=50?'#633806':'#A32D2D';
  document.getElementById('detailBody').innerHTML =
    '<div class="brand-row"><div class="brand-ico">'+d.brand.substring(0,2)+'</div><div><div class="brand-name">'+d.brand+'</div><div class="brand-cat">'+d.category+'</div></div></div>'+
    '<div class="sms-box"><div class="sms-lbl">원문 문자</div><div class="sms-text">'+(d.raw_sms||'원문 없음')+'</div></div>'+
    '<div class="info-grid"><div class="info-cell"><div class="info-lbl">유효기간</div><div class="info-val">~'+fmtDate(d.end_date)+'</div></div><div class="info-cell"><div class="info-lbl">적용 지역</div><div class="info-val">'+(d.location||'미확인')+'</div></div><div class="info-cell"><div class="info-lbl">카테고리</div><div class="info-val">'+d.category+'</div></div><div class="info-cell"><div class="info-lbl">제출자 수</div><div class="info-val">'+(d.submit_count||1)+'명</div></div></div>'+

  try {

      'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=' + GEMINI_KEY,
      {
        method: 'POST',

      {cat:'음료/카페', keys:['커피','아메리카노','라떼','카페','음료','버블티']},
      {cat:'편의점', keys:['편의점','도시락','삼각김밥','컵라면']},
      {cat:'배달앱', keys:['배달','주문','치킨','피자','족발','보쌈']},
      {cat:'패션/의류', keys:['의류','패션','옷','티셔츠','신발','코트']},
      {cat:'뷰티/헬스', keys:['화장품','스킨케어','마스크팩','선크림','헬스']},
      {cat:'마트/쇼핑', keys:['마트','쇼핑','장보기','생필품']},
      {cat:'금융/카드', keys:['적금','카드','금리','이자','대출','캐시백','포인트','저축','은행']},
      {cat:'통신', keys:['데이터','요금','통화','인터넷','5G','LTE','로밍']},
      {cat:'외식', keys:['햄버거','버거','치킨','피자','감자튀김']},
      {cat:'여행/숙박', keys:['호텔','숙소','펜션','여행','항공']},
      {cat:'OTT/구독', keys:['구독','스트리밍','영화','드라마']},
      {cat:'공공/기타', keys:['안내','알림','공지','신청','접수','복지']}
    ];
    for(var k=0; k<KEYWORD_CAT.length; k++) {
      for(var l=0; l<KEYWORD_CAT[k].keys.length; l++) {
        if(text.includes(KEYWORD_CAT[k].keys[l])) {
          category = KEYWORD_CAT[k].cat;
          break;
        }
      }
      if(category) break;
    }
    if(!category) category = '기타';
  }

  // ---
  var summary = '';

  // 인사말 제거한 클린 텍스트 준비
  var cleanText = text
    .replace(/안녕하세요[.,!\s]*/g, '')
    .replace(/[가-힣a-zA-Z0-9\s&]{2,20}(?:입니다|에서)[.,!\s]*/g, '')
    .replace(/\[.*?\]/g, '')
    .replace(/\(.*?\)/g, '')
    .replace(/https?:\/\/\S+/g, '')
    .replace(/\d{2,4}-\d{3,4}-\d{4}/g, '')
    .replace(/무료수신거부.*$/g, '')
    .trim();

  // 패턴 1: 숫자+단위 혜택 (1+1, 50% 할인, 3000원 할인 등)
  var benefitPatterns = [
    /최대\s*연\s*[\d.]+%[^,。\n]{0,15}/,
    /연\s*[\d.]+%[^,。\n]{0,10}/,
    /\d+\+\d+/,
    /\d+%\s*(?:할인|캐시백|적립|off)/,
    /\d+만?\s*원\s*(?:할인|쿠폰|즉시할인|적립)/,
    /무료\s*(?:배송|쿠폰|증정|이용|제공)/,
    /(?:최대|최고)\s*\d+%/,
    /[가-힣]+\s*\d+(?:개월|회|박)\s*[가-힣]+\s*\d+(?:개월|회|박)\s*(?:추가|제공|무료)/,
    /[가-힣]+\s*\d+(?:개월|회)\s*(?:등록|가입)[^,。\n]{0,10}/,
  ];
  for(var p=0; p<benefitPatterns.length; p++) {
    var bm = cleanText.match(benefitPatterns[p]);
    if(bm) {
      summary = bm[0].replace(/\s+/g,' ').trim();
      if(summary.length > 25) summary = summary.substring(0,25);
      break;
    }
  }

  // 패턴 2: 이벤트/혜택 문장 추출 — 번호 매긴 목록 첫 번째 항목
  if(!summary) {
    var listMatch = cleanText.match(/1[.\)、]\s*([^\n!！]{3,30})/);
    if(listMatch) summary = listMatch[1].trim().substring(0,25);
  }

  // 패턴 3: 클린 텍스트 첫 문장
  if(!summary) {
    var firstLine = cleanText.split(/[!！\n。]/)[0].trim();
    if(firstLine.length > 3) summary = firstLine.substring(0,25);
  }

  // ---
  var endDate = null;
  var now2 = new Date();
  var year2 = now2.getFullYear();
  var datePatterns = [
    { re:/(\d{4})년\s*(\d{1,2})월\s*(\d{1,2})일/, fn:function(m){ return m[1]+'-'+pad(m[2])+'-'+pad(m[3]); }},
    { re:/(\d{4})[.\-\/](\d{1,2})[.\-\/](\d{1,2})/, fn:function(m){ return m[1]+'-'+pad(m[2])+'-'+pad(m[3]); }},
    { re:/(\d{1,2})월\s*(\d{1,2})일/, fn:function(m){ return year2+'-'+pad(m[1])+'-'+pad(m[2]); }},
    { re:/~\s*(\d{1,2})[\/\.](\d{1,2})/, fn:function(m){ return year2+'-'+pad(m[1])+'-'+pad(m[2]); }},
    { re:/(\d{1,2})[\/\.](\d{1,2})\s*까지/, fn:function(m){ return year2+'-'+pad(m[1])+'-'+pad(m[2]); }},
    { re:/(\d{1,2})월말/, fn:function(m){ return year2+'-'+pad(m[1])+'-28'; }},
  ];
  for(var dp=0; dp<datePatterns.length; dp++) {
    var dm = text.match(datePatterns[dp].re);
    if(dm) { endDate = datePatterns[dp].fn(dm); break; }
  }

  // ---
  var location = '전국';
  if(/앱\s*(전용|한정|only)/i.test(text) || text.includes('앱에서') || text.includes('앱 쿠폰')) location = '앱전용';
  else if(text.includes('온라인') || text.includes('홈페이지')) location = '온라인';
  else {
    var locMatch2 = text.match(/([가-힣]{2,5}[시군구])\s|([가-힣]{2,5}점)\s/);
    if(locMatch2) location = (locMatch2[1]||locMatch2[2]).trim();
  }

  // ---
  // 기준: 브랜드 인식(+30) 혜택요약(+20) 유효기간(+15) 발신자확인(+10) 지역명시(+5)
  // 감점: 비현실적할인(-40) 개인정보요구(-30) 공공기관(-10) 너무짧음(-20)
  var score = 20;
  if(brand && brand !== '알수없음') score += 30;
  if(summary && summary.length > 3) score += 20;
  if(endDate) score += 15;
  if(rawSender && rawSender.length >= 2) score += 10;
  if(location !== '전국') score += 5;
  if(/100%\s*무료|전부\s*공짜|완전\s*무료/.test(text)) score -= 40;
  if(/개인정보|비밀번호|계좌번호/.test(text)) score -= 30;
  if(category === '공공/기타') score -= 10;
  if(text.length < 15) score -= 20;
  score = Math.max(5, Math.min(100, score));

  return { brand:brand, category:category, summary:summary, end_date:endDate, location:location, trust_score:score, is_fake:score<20 };
}

function showAIResult(d) {
  aiResult = d;
  var tc = d.trust_score>=75?'#639922':d.trust_score>=50?'#BA7517':'#E24B4A';
  var tt = d.trust_score>=75?'#3B6D11':d.trust_score>=50?'#633806':'#A32D2D';
  var tl = d.trust_score>=75?'높음':d.trust_score>=50?'보통':'낮음';
  document.getElementById('resultBody').innerHTML =
    '<div class="result-row"><span class="result-lbl"><i class="ti ti-building-store"></i>브랜드</span><span class="result-val">'+d.brand+'</span></div>'+
    '<div class="result-divider"></div>'+
    '<div class="result-row"><span class="result-lbl"><i class="ti ti-tag"></i>혜택 요약</span><span class="result-val">'+d.summary+'</span></div>'+
    '<div class="result-divider"></div>'+
    '<div class="result-row"><span class="result-lbl"><i class="ti ti-category"></i>카테고리</span><span class="result-val">'+d.category+'</span></div>'+
    '<div class="result-divider"></div>'+
    '<div class="result-row"><span class="result-lbl"><i class="ti ti-map-pin"></i>지역</span><span class="result-val">'+d.location+'</span></div>'+
    '<div class="result-divider"></div>'+
    '<div class="result-row"><span class="result-lbl"><i class="ti ti-calendar"></i>유효기간</span><span class="result-val">'+(d.end_date?'~'+fmtDate(d.end_date):'미확인')+'</span></div>'+
    '<div class="result-divider"></div>'+
    '<div class="result-row"><span class="result-lbl"><i class="ti ti-shield-check"></i>신뢰도</span><div class="trust-mini"><div class="tbar"><div class="tfill" style="width:'+d.trust_score+'%;background:'+tc+'"></div></div><span style="font-size:13px;font-weight:700;color:'+tt+'">'+d.trust_score+'점 · '+tl+'</span></div></div>';
  document.getElementById('resultCard').classList.add('show');
  var btn = document.getElementById('submitOk');
  btn.disabled = false;
  btn.textContent = '이대로 제출하기';
}

function doSubmit() {
  if(!aiResult) return;
  var sms = document.getElementById('smsTA').value.trim();
  var btn = document.getElementById('submitOk');
  btn.disabled = true;
  btn.textContent = '저장 중...';
  var item = {
    brand: aiResult.brand,
    category: aiResult.category,
    summary: aiResult.summary,
    raw_sms: sms,
    end_date: aiResult.end_date || null,
    location: aiResult.location,
    trust_score: aiResult.trust_score,
    status: 'approved',
    submit_count: 1
  };

  if(db) {
    db.from('sms_benefits').insert([item]).select()
      .then(function(res){
        if(res.error) {
          console.error('Supabase 저장 오류:', res.error);
          showToast('저장 오류: ' + res.error.message);
          btn.disabled = false;
          btn.textContent = '다시 시도하기';
          return;
        }
        console.log('Supabase 저장 성공:', res.data);
        if(res.data && res.data[0]) allItems.unshift(res.data[0]);
        onSubmitDone(item.status);
      })
      .catch(function(e){
        console.error('네트워크 오류:', e);
        showToast('네트워크 오류가 생겼어요. 다시 시도해주세요.');
        btn.disabled = false;
        btn.textContent = '다시 시도하기';
      });
  } else {
    item.id = Date.now();
    allItems.unshift(item);
    onSubmitDone(item.status);
  }
}

function onSubmitDone(status) {
  var btn = document.getElementById('submitOk');
  btn.textContent = '제출 완료! 리스트에 추가됐어요';
  btn.style.background = '#085041';
  renderList();
  setTimeout(function(){
    closeSheet();
    showToast('혜택이 등록됐어요!');
  }, 1000);
}

function calcDday(ds) {
  if(!ds) return null;
  var d = Math.ceil((new Date(ds)-new Date())/(1000*60*60*24));
  return d>=0?d:null;
}

function fmtDate(ds) {
  if(!ds) return '미확인';
  var d = new Date(ds);
  return (d.getMonth()+1)+'/'+(d.getDate());
}

var toastTimer = null;
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ t.classList.remove('show'); }, 2500);
}

window.addEventListener('DOMContentLoaded', init);
</script>
